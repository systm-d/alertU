<!DOCTYPE html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{{ config.description }}" />
    <meta name="theme-color" content="#04070c" />
    <meta property="og:title" content="{{ config.title }}" />
    <meta property="og:description" content="{{ config.description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="{{ get_url(path='og.jpg') }}" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="{{ get_url(path='favicon.png') }}" />
    <link rel="stylesheet" href="{{ get_url(path='syntax.css') }}" />
    <link rel="stylesheet" href="{{ get_url(path='main.css') }}" />
  </head>
  <body>
    <div class="glow" aria-hidden="true"></div>
    {% block content %}{% endblock content %}
    <footer>
      {% if lang == 'fr' %}
      100 % local <span class="sep">·</span> Linux + systemd <span class="sep">·</span> MIT
      {% else %}
      100% local <span class="sep">·</span> Linux + systemd <span class="sep">·</span> MIT
      {% endif %}
      <span class="sep">·</span> <a href="{{ config.extra.repo_url }}">GitHub</a>
    </footer>
  </body>
</html>
