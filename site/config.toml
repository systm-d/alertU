base_url = "https://systm-d.github.io/alertU"
title = "AlertU"
description = "A car alarm for your computer. Lock it, walk away, and AlertU stands guard — sounding off, snapping a photo and pinging your phone the moment someone touches it. A Linux CLI, open source, MIT."
default_language = "en"
compile_sass = true
build_search_index = false

[markdown]
highlight_code = true
highlight_theme = "css"
highlight_themes_css = [
  { theme = "base16-ocean-dark", filename = "syntax.css" },
]

[languages.fr]
title = "AlertU"
description = "Une alarme de voiture pour votre ordinateur. Verrouillez, éloignez-vous, et AlertU monte la garde — sirène, photo et alerte sur votre téléphone dès qu'on y touche. Un CLI Linux, open source, MIT."

[extra]
brand_color = "#2b6bff"
repo_url = "https://github.com/systm-d/alertU"
