name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deb:
    name: Debian package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # alertu-settings builds eframe, which needs the X11/Wayland/GL headers.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev

      # A tag that disagrees with Cargo.toml would produce a package labelled
      # with one version and containing another.
      - name: Check the tag matches the crate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          crate=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$crate" != "$tag" ]; then
            echo "tag $tag does not match Cargo.toml version $crate" >&2
            exit 1
          fi
          echo "version $crate"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb

      - name: Build
        run: cargo build --release --locked

      # No -o: cargo-deb's default name is the Debian convention
      # (alertu_0.1.0-1_amd64.deb), which is what someone holding two releases
      # needs. It prints the path it wrote, so capture that rather than
      # reconstructing the name from the version and the architecture.
      - name: Stage and package
        run: |
          ./packaging/stage.sh
          deb=$(cargo deb --no-build -p alertu-daemon)
          echo "deb=$deb" >> "$GITHUB_ENV"
          echo "produced $deb"

      # Unlike the developer's Fedora machine, this runner has a Debian package
      # database, so `$auto` resolves real dependencies here — and this is the
      # only place that can be checked.
      - name: Show what was produced
        run: |
          dpkg-deb -I "$deb"
          dpkg-deb -c "$deb"
          dpkg-deb -f "$deb" Depends | grep -q libc6 || { echo "Depends lost its \$auto resolution" >&2; exit 1; }

      # A package that builds but does not install is worthless, and that is
      # only ever discovered by trying. The runner has systemd, so the unit is
      # genuinely enabled and started here.
      #
      # `is-enabled` passes for a unit that enabled cleanly and then died on
      # start, and cargo-deb's generated start fragment is itself `|| true`, so
      # `is-active` is the assertion that actually catches a broken daemon.
      - name: Install it
        run: |
          sudo apt-get install -y "$deb"
          alertu-ctl --version
          systemctl is-enabled alertu-daemon
          systemctl is-active --quiet alertu-daemon || { sudo journalctl -u alertu-daemon --no-pager -n 50; exit 1; }
          dpkg -L alertu | sort

      - name: Remove it again
        run: sudo apt-get purge -y alertu

      - uses: actions/upload-artifact@v4
        with:
          name: alertu-deb
          path: ${{ env.deb }}

      # `upload` requires a release to exist already, which it does not when the
      # tag was pushed with plain `git tag && git push --tags`. Create it if
      # missing, fall back to uploading into one made by hand or by the UI.
      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$deb" --generate-notes ||
            gh release upload "$GITHUB_REF_NAME" "$deb" --clobber

  rpm:
    name: Fedora package
    runs-on: ubuntu-latest
    # Both jobs end in `gh release create ... || gh release upload ...`. Run in
    # parallel, whichever finished first would publish a release carrying one of
    # the two artefacts and notify every watcher of it. Serialising means the
    # deb job creates the release and this one uploads into it. `needs` only
    # orders the jobs; on a branch push, where neither attaches anything, the
    # ordering is invisible, and if the deb job fails there is no half-published
    # release to explain.
    needs: deb
    steps:
      - uses: actions/checkout@v7

      # A tag that disagrees with Cargo.toml would produce a package labelled
      # with one version and containing another.
      - name: Check the tag matches the crate version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          crate=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$crate" != "$tag" ]; then
            echo "tag $tag does not match Cargo.toml version $crate" >&2
            exit 1
          fi
          echo "version $crate"

      # Built inside Fedora on purpose. --auto-req shells out to
      # /usr/lib/rpm/find-requires and resolves against the local RPM database;
      # on Ubuntu it would silently produce a package that claims to need
      # nothing. The Debian branch shipped exactly that failure in reverse.
      - name: Build and package inside Fedora
        run: |
          docker run --rm -v "$PWD":/w -w /w fedora:43 bash -c '
            set -eux
            dnf install -y -q gcc rust cargo rpm-build \
              libxkbcommon-devel wayland-devel mesa-libGL-devel \
              libX11-devel libXcursor-devel libXrandr-devel libXi-devel
            # Pinned. The asset field spellings (source/dest/mode) and the
            # *_script field names in Cargo.toml were verified against 0.21;
            # a 0.22 that renamed one would break the release at tag time, in
            # the one workflow nobody runs before tagging.
            cargo install cargo-generate-rpm --locked --version "~0.21"
            cargo build --release --locked
            ./packaging/stage.sh
            ~/.cargo/bin/cargo-generate-rpm -p crates/alertu-daemon --auto-req auto
          '
          rpm=$(ls target/generate-rpm/*.rpm)
          echo "rpm=$rpm" >> "$GITHUB_ENV"
          echo "produced $rpm"

      # The glibc gate is not decoration. This job builds with Fedora's own
      # rustc (`dnf install rust cargo`) rather than the pinned toolchain the
      # deb job uses, so a std that references one more symbol version silently
      # raises the floor -- and README.md and README.Fedora both promise Fedora
      # 40 or newer, derived from GLIBC_2.39. Nothing else would notice until a
      # Fedora 40 user hit an unresolvable dependency.
      #
      # `-e rpm` forwards the host variable the build step wrote to $GITHUB_ENV,
      # so the path is expanded inside the container rather than spliced into
      # the script text.
      - name: Show what was produced
        run: |
          docker run --rm -v "$PWD":/w -w /w -e rpm fedora:43 bash -c '
            set -e
            rpm -qpl "$rpm"
            rpm -qp --requires "$rpm"
            rpm -qp --recommends "$rpm"
            rpm -qp --requires "$rpm" | grep -q "libc\.so\.6" || {
              echo "Requires lost its --auto-req resolution" >&2; exit 1; }
            max=$(rpm -qp --requires "$rpm" | grep -o "GLIBC_[0-9.]*" | sort -uV | tail -1)
            [ "$max" = GLIBC_2.39 ] || {
              echo "glibc floor moved to $max: update README.md and README.Fedora" >&2; exit 1; }
            echo "glibc floor $max"
          '

      # A package that builds but does not install is worthless, and that is
      # only discovered by trying. systemd as PID 1 so the unit is genuinely
      # enabled and started, and so the upgrade path is exercised -- the RPM
      # scriptlets' $1 semantics fail silently and nothing else catches them.
      - name: Install, upgrade and remove it
        run: |
          # The stock fedora:43 image has no systemd at all -- no /usr/sbin/init,
          # no systemctl, `rpm -q systemd` says it is not installed -- so it
          # cannot be run as PID 1 and every command below would die. Install it.
          printf 'FROM fedora:43\nRUN dnf install -y systemd procps-ng && dnf clean all\nCMD ["/usr/sbin/init"]\n' > /tmp/sysd.Dockerfile
          docker build -t fedora43-systemd -f /tmp/sysd.Dockerfile /tmp
          docker run -d --name rpmtest --privileged --cgroupns=host \
            -v "$PWD/target/generate-rpm":/rpms:ro fedora43-systemd

          # Wait for PID 1 to finish booting rather than guessing at a sleep.
          # `degraded` is normal in a container (units that want real hardware
          # fail); only `running` and `degraded` mean the manager is answering.
          for _ in $(seq 1 60); do
            state=$(docker exec rpmtest systemctl is-system-running 2>/dev/null || true)
            case "$state" in running | degraded) break ;; esac
            sleep 1
          done
          echo "systemd is $state"
          case "$state" in running | degraded) ;; *) docker logs rpmtest; exit 1 ;; esac

          docker exec rpmtest bash -c 'dnf install -y /rpms/*.rpm'
          docker exec rpmtest bash -c 'alertu-ctl --version'

          # The branch's most-repeated claim -- "unlike the .deb, the package
          # does not start the daemon" -- is in README.md, README.Fedora and the
          # %post message, and without this line nothing tests it: swapping
          # `systemctl preset` for `enable --now` in post_install.sh would leave
          # this job green. `is-enabled` exits non-zero on a disabled unit, so
          # the `!` makes the whole command succeed only while it stays that
          # way, and docker exec passes the code straight out to `bash -e`.
          docker exec rpmtest bash -c '! systemctl is-enabled --quiet alertu-daemon'

          # The example config and the licence must survive the tsflags=nodocs
          # that Fedora's own container and cloud images set, because the %post
          # message points at the first of them.
          docker exec rpmtest bash -c 'test -f /usr/share/doc/alertu/config.example.toml'
          docker exec rpmtest bash -c 'test -f /usr/share/licenses/alertu/LICENSE'

          docker exec rpmtest bash -c 'systemctl enable --now alertu-daemon'
          docker exec rpmtest bash -c 'sleep 2; systemctl is-active --quiet alertu-daemon' \
            || { docker exec rpmtest journalctl -u alertu-daemon --no-pager -n 50; exit 1; }
          docker exec rpmtest bash -c 'test -S /run/alertu/alertu.sock'

          # The daemon runs under ProtectSystem=strict with /etc/alertu as one
          # of the few writable paths; if that ever stops being true it saves
          # nothing and says so only in its log. Write through the running
          # daemon, not with a shell, so the unit's sandbox is what is tested.
          docker exec rpmtest bash -c 'printf "grace_period_secs = 42\n" | alertu-ctl set-config -'
          docker exec rpmtest bash -c 'grep -q "grace_period_secs = 42" /etc/alertu/config.toml'

          # Something for `dnf remove` to spare. Snapshots are webcam stills
          # from real alarms: losing them on an uninstall would be data loss.
          docker exec rpmtest bash -c 'mkdir -p /var/lib/alertu/snapshots && touch /var/lib/alertu/snapshots/keep.jpg'

          docker exec rpmtest bash -c 'dnf reinstall -y /rpms/*.rpm'
          docker exec rpmtest bash -c 'sleep 2; systemctl is-active --quiet alertu-daemon' \
            || { echo "the daemon did not survive an upgrade: check the \$1 guards" >&2; exit 1; }

          docker exec rpmtest bash -c 'dnf remove -y alertu'
          # Neither path is in the manifest, so removal must leave both behind.
          docker exec rpmtest bash -c 'test -f /var/lib/alertu/snapshots/keep.jpg && test -d /etc/alertu'
          docker rm -f rpmtest

      - uses: actions/upload-artifact@v4
        with:
          name: alertu-rpm
          path: ${{ env.rpm }}

      # `upload` requires a release to exist already, which it does not when the
      # tag was pushed with plain `git tag && git push --tags`. Create it if
      # missing, fall back to uploading into one made by hand or by the UI.
      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$rpm" --generate-notes ||
            gh release upload "$GITHUB_REF_NAME" "$rpm" --clobber
