# System account the AlertU daemon runs as.
#
# `systemd-sysusers` creates the account and its group memberships at package
# install time, so a real distro package needs no post-install scriptlet. The
# daemon needs `input` to read /dev/input/event* and `video` to capture webcam
# snapshots; it deliberately does not run as root.
#
# Apply manually with:  sudo systemd-sysusers packaging/sysusers.d/alertu.conf
#
# This does not — and cannot — add your own desktop account to any group. No
# package may modify existing human accounts, and at install time there is no
# reliable way to tell which account is yours. See the README's install steps.
u alertu - "AlertU daemon" - -
m alertu input
m alertu video
